<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
    }

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow-x: hidden !important;
      background: #f5f7fa;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      background: linear-gradient(180deg, #f5f7fa 0%, #eaf2fb 100%);

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin-top: clamp(10px, 5vh, 40px);
      padding: 0 16px;
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 16px;
      }
      .container {
        max-width: 100%;
        padding: 0 16px;
      }
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      
      box-shadow: 
        0 10px 30px rgba(10, 61, 98, 0.08),
        0 0 0 1px rgba(60, 145, 230, 0.05);

      animation: fadeIn 0.4s ease;
    }


    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0A3D62;
    }

    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid #CFE3FF;
      font-size: 16px;
      margin-bottom: 25px;
      outline: none;
      transition: 0.2s;
      text-align: center;
      letter-spacing: 3px;
      font-weight: 600;
      touch-action: manipulation;
    }

    input:focus {
      border-color: #3C91E6;
      box-shadow: 0 0 0 3px rgba(60, 145, 230, 0.15);
    }

    input.error {
      border-color: red;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #0A3D62, #3C91E6);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(10, 61, 98, 0.25);
      margin-bottom: 10px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
      box-shadow: 0 3px 8px rgba(10, 61, 98, 0.2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-size: 14px;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 12px;
      margin-top: 15px;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }

    .premium-loader {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px; /* adds space below the button */
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3C91E6;
      opacity: 0.3;
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.4);
        opacity: 0.5;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
    }

    @media (max-width: 360px) {
      h1 {
        font-size: 20px; /* smaller title for tiny screens */
      }

      p {
        font-size: 13px;
      }

      input, button {
        padding: 12px;
        font-size: 14px;
        letter-spacing: 2px;
      }
  
      .premium-loader span {
        font-size: 13px;
      }

    } 

    /* ✅ SUCCESS ANIMATION */

    .success-animation {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .checkmark-circle {
      position: relative; /* IMPORTANT */
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #28a745;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.4s ease, glowPulse 1.5s infinite;
      overflow: visible;
      box-shadow: 0 0 12px rgba(40, 167, 69, 0.6),
                  0 0 24px rgba(40, 167, 69, 0.4);
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 8px rgba(40,167,69,0.5); }
      50% { box-shadow: 0 0 20px rgba(40,167,69,0.8); }
      100% { box-shadow: 0 0 8px rgba(40,167,69,0.5); }
    }

    /* 🔥 RIPPLE EFFECT */

    .checkmark-circle::before,
    .checkmark-circle::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(40, 167, 69, 0.4);
      animation: ripple 1.5s infinite;
      z-index: -1;
    }

    .checkmark-circle::after {
      animation-delay: 0.75s;
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      70% {
        transform: scale(1.8);
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .checkmark {
      width: 20px;
      height: 10px;
      border-left: 3px solid white;
      border-bottom: 3px solid white;
      transform: rotate(-45deg);
      animation: draw 0.3s ease 0.2s forwards;
      opacity: 0;
    }

    .success-text {
      font-size: 16px;
      font-weight: 600;
      color: #28a745;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

    <audio id="successSound" src="https://assets.codepen.io/3/success.mp3" preload="auto"></audio>  

      <div class="container">
        <div class="card">

    <h1>KNOW YOUR WATER</h1>
    <p>Enter your 8-digit code</p>

    <input 
      id="code" 
      maxlength="9" 
      placeholder="XXXX XXXX" 
      autofocus 
      spellcheck="false" 
      oninput="formatCode(this)">
      
    
    <input type="text" id="trap" style="display:none">

    <button id="submitBtn" onclick="submitForm()">View Lab Report</button>

    <div id="msg"></div>

    <div class="footer">
      Water Quality Verification System
    </div>

        </div>
      </div>
    
<script>


window.onerror = function(msg, url, line, col, error) {
  const errorDiv = document.createElement('div');
  errorDiv.style.padding = '20px';
  errorDiv.style.fontFamily = 'sans-serif';
  errorDiv.innerHTML = `
    <h3>JS Error</h3>
    <p><b>Message:</b> ${msg}</p>
    <p><b>Line:</b> ${line}</p>
  `;
  document.body.prepend(errorDiv); // insert at top instead of replacing whole body
};

let isSubmitting = false;

// =======================
// VALIDATION
// =======================

function validate(code) {
  const input = document.getElementById("code");

  if (!code || code.length !== 8) {
    input.classList.add("error");   // ADD THIS
    showMessage("Enter a valid 8-character code");
    return false;
  }

  input.classList.remove("error"); // ADD THIS
  return true;
}

// =======================
// MESSAGE
// =======================

function showMessage(text, isError = true) {
  const msg = document.getElementById("msg");
  msg.className = isError ? "error" : "success";
  msg.innerHTML = text;
}

// =======================
// GET IP (SAFE VERSION)
// =======================

async function getIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch (e) {
    return "0.0.0.0"; // fallback
  }
}

// =======================
// SUBMIT
// =======================

async function submitForm() {

  const btn = document.getElementById("submitBtn");

  if (btn.disabled || isSubmitting) return;

  isSubmitting = true;
  btn.disabled = true;
    
  const code = document.getElementById("code").value.replace(/\s/g, "").toUpperCase();
  const trap = document.getElementById("trap").value;

  document.getElementById("code").blur();

  const device = navigator.userAgent + "|" + 
    (window.innerWidth || 0) + "x" + (window.innerHeight || 0);
  
  if (code.length !== 8) {
    showMessage("Enter a valid 8-character code");

    // enable
    isSubmitting = false;
    btn.disabled = false;
    return;
  }

  if (!validate(code)) {

    // enable
    isSubmitting = false;
    btn.disabled = false;
    return;
  }

  const msg = document.getElementById("msg");

  // ✅ RESET COLOR CLASS
  msg.className = "";

  // ✅ SET LOADER
  msg.innerHTML = `
    <div class="premium-loader">
      <span>Verifying</span>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  let ip = await getIP();

  if (!ip || ip === "0.0.0.0") {
    ip = Math.random().toString(36).substring(2, 10);
  }

  const API_URL = "https://script.google.com/macros/s/AKfycbxnH2Y1FQVFRDdlDoYy6x0k3xhM03e8KhR3foBv6O8rkbM_XbIZq3EgsnUAXW_5A8xN/exec";

  try {
    const response = await fetch(
      `${API_URL}?action=verify&batch=${code}&ip=${ip}&device=${encodeURIComponent(device)}&trap=${trap}`
    );

    const data = await response.json();
    handleResponse(data);

  } catch (err) {
    showMessage("Please try again in a moment");
    isSubmitting = false;
    btn.disabled = false;
  }
}

// =======================
// RESPONSE
// =======================

function handleResponse(res) {

  isSubmitting = false;
  const btn = document.getElementById("submitBtn");

  if (!res) {
    showMessage("Please try again in a moment");
    btn.disabled = false;
    return;
  }

  if (res.status === "LIMIT_EXCEEDED") {
    btn.disabled = false;
    showMessage("Too many attempts");
    return;
  }

  if (res.status === "NOT_FOUND") {
    btn.disabled = false;
    showMessage("Code not found");
    return;
  }

  // SUCCESS BLOCK (mobile-safe)
  if (res.status === "SUCCESS") {

    const msg = document.getElementById("msg");
    
    // play ding sound
    const sound = document.getElementById("successSound");
    if (sound) sound.play().catch(e => console.log("Sound play blocked:", e));
    
    btn.disabled = true;

    // 📳 vibration (mobile only)
    if (navigator.vibrate) {
      navigator.vibrate(120);
    }

    msg.className = "";

    msg.innerHTML = `
      <div class="success-animation">
        <div class="checkmark-circle">
          <div class="checkmark"></div>
        </div>
        <div class="success-text">Verified</div>
      </div>
    `;

    // wait for animation, then redirect
    setTimeout(() => {
      window.location.href = res.url;
    }, 1200);

    return;
  }

  if (res.status === "INVALID") {
    btn.disabled = false;
    showMessage("Enter a valid 8-character code");
    return;
  }

  if (res.status === "ERROR") {
    btn.disabled = false;
    showMessage("Please try again in a moment");
    return;
  }
}

function formatCode(input) {

  let value = input.value.toUpperCase();

  // ❌ remove everything except allowed chars
  value = value.replace(/[^ABCDEFGHJKMNPQRSTUVWXYZ23456789]/g, "");

  // ✅ limit to 8 characters ONLY
  value = value.substring(0, 8);

  // ✅ add space after 4 chars
  if (value.length > 4) {
    value = value.substring(0, 4) + " " + value.substring(4);
  }

  input.value = value;

  // remove error style
  input.classList.remove("error");

  const btn = document.getElementById("submitBtn");

  // only enable if not submitting
  if (!isSubmitting) {
    btn.disabled = false;
  }

}


</script>

</body>
</html>
