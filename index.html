<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">  
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
    }

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow-x: hidden !important;
      background: #f5f7fa;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #f5f7fa;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 12px;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
    }
}

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(10, 61, 98, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0A3D62;
    }

    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid #CFE3FF;
      font-size: 16px;
      margin-bottom: 25px;
      outline: none;
      transition: 0.2s;
      text-align: center;
      letter-spacing: 3px;
      font-weight: 600;
      touch-action: manipulation;
    }

    input:focus {
      border-color: #3C91E6;
    }

    input.error {
      border-color: red;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #0A3D62, #3C91E6);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(10, 61, 98, 0.25);
      margin-bottom: 10px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
      box-shadow: 0 3px 8px rgba(10, 61, 98, 0.2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-size: 14px;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 12px;
      margin-top: 15px;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }

    .premium-loader {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px; /* adds space below the button */
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3C91E6;
      opacity: 0.3;
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.4);
        opacity: 0.5;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
    }

    @media (max-width: 360px) {
      h1 {
        font-size: 20px; /* smaller title for tiny screens */
      }

      p {
        font-size: 13px;
      }

      input, button {
        padding: 12px;
        font-size: 14px;
        letter-spacing: 2px;
      }
  
      .premium-loader span {
        font-size: 13px;
      }

    } 

  </style>
</head>

<body>

    <div id="app" style="
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      max-width: 100vw;
      height: 100vh;
      overflow-y: auto;
      background: #f5f7fa;
    ">
      <div class="container">
        <div class="card">

    <h1>KNOW YOUR WATER</h1>
    <p>Enter your 8-digit code</p>

    <input 
      id="code" 
      maxlength="9" 
      placeholder="XXXX XXXX" 
      autofocus 
      spellcheck="false" 
      oninput="formatCode(this)">
      
    
    <input type="text" id="trap" style="display:none">

    <button id="submitBtn" onclick="submitForm()">View Lab Report</button>

    <div id="msg"></div>

    <div class="footer">
      Water Quality Verification System
    </div>

        </div>
      </div>
    </div>  <!-- container -->
<script>


window.onerror = function(msg, url, line, col, error) {
  const errorDiv = document.createElement('div');
  errorDiv.style.padding = '20px';
  errorDiv.style.fontFamily = 'sans-serif';
  errorDiv.innerHTML = `
    <h3>JS Error</h3>
    <p><b>Message:</b> ${msg}</p>
    <p><b>Line:</b> ${line}</p>
  `;
  document.body.prepend(errorDiv); // insert at top instead of replacing whole body
};

let isSubmitting = false;

// =======================
// VALIDATION
// =======================

function validate(code) {
  const input = document.getElementById("code");

  if (!code || code.length !== 8) {
    input.classList.add("error");   // ADD THIS
    showMessage("Enter a valid 8-character code");
    return false;
  }

  input.classList.remove("error"); // ADD THIS
  return true;
}

// =======================
// MESSAGE
// =======================

function showMessage(text, isError = true) {
  const msg = document.getElementById("msg");
  msg.className = isError ? "error" : "success";
  msg.innerHTML = text;
}

// =======================
// GET IP (SAFE VERSION)
// =======================

async function getIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch (e) {
    return "0.0.0.0"; // fallback
  }
}

// =======================
// SUBMIT
// =======================

async function submitForm() {

  const btn = document.getElementById("submitBtn");

  if (btn.disabled || isSubmitting) return;

  isSubmitting = true;
  btn.disabled = true;
    
  const code = document.getElementById("code").value.replace(/\s/g, "").toUpperCase();
  const trap = document.getElementById("trap").value;

  document.getElementById("code").blur();

  const device = navigator.userAgent + "|" + 
    (window.innerWidth || 0) + "x" + (window.innerHeight || 0);
  
  if (code.length !== 8) {
    showMessage("Enter a valid 8-character code");

    // enable
    isSubmitting = false;
    btn.disabled = false;
    return;
  }

  if (!validate(code)) {

    // enable
    isSubmitting = false;
    btn.disabled = false;
    return;
  }

  const msg = document.getElementById("msg");

  // ✅ RESET COLOR CLASS
  msg.className = "";

  // ✅ SET LOADER
  msg.innerHTML = `
    <div class="premium-loader">
      <span>Verifying</span>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  let ip = await getIP();

  if (!ip || ip === "0.0.0.0") {
    ip = Math.random().toString(36).substring(2, 10);
  }

  google.script.run
    .withSuccessHandler(handleResponse)
    .withFailureHandler(() => {
      showMessage("Please try again in a moment");
      isSubmitting = false;
      btn.disabled = false;
    })
    .verifyBatch(code, ip, device, trap); // ✅ call the wrapper function
}

// =======================
// RESPONSE
// =======================

function handleResponse(res) {

  isSubmitting = false;
  const btn = document.getElementById("submitBtn");

  if (!res) {
    showMessage("Please try again in a moment");
    btn.disabled = false;
    return;
  }

  if (res.status === "LIMIT_EXCEEDED") {
    btn.disabled = false;
    showMessage("Too many attempts");
    return;
  }

  if (res.status === "NOT_FOUND") {
    btn.disabled = false;
    showMessage("Code not found");
    return;
  }

// SUCCESS BLOCK (mobile-safe)
if (res.status === "SUCCESS") {

  const btn = document.getElementById("submitBtn");

  // Show success message in green
  showMessage("✔ Verified: This bottle passed certified lab testing", false);

  btn.disabled = true;

  // Mobile-safe redirect (no popup blockers)
  window.location.href = res.url;

  return;
}

  if (res.status === "INVALID") {
    btn.disabled = false;
    showMessage("Enter a valid 8-character code");
    return;
  }

  if (res.status === "ERROR") {
    btn.disabled = false;
    showMessage("Please try again in a moment");
    return;
  }
}

function formatCode(input) {

  let value = input.value.toUpperCase();

  // ❌ remove everything except allowed chars
  value = value.replace(/[^ABCDEFGHJKMNPQRSTUVWXYZ23456789]/g, "");

  // ✅ limit to 8 characters ONLY
  value = value.substring(0, 8);

  // ✅ add space after 4 chars
  if (value.length > 4) {
    value = value.substring(0, 4) + " " + value.substring(4);
  }

  input.value = value;

  // remove error style
  input.classList.remove("error");

  const btn = document.getElementById("submitBtn");

  // only enable if not submitting
  if (!isSubmitting) {
    btn.disabled = false;
  }

}

// 🚀 BREAK OUT OF APPS SCRIPT CONTAINER
(function() {
  const body = document.body;
  const html = document.documentElement;

  body.style.maxWidth = "100vw";
  body.style.margin = "0";
  body.style.padding = "0";

  html.style.maxWidth = "100vw";

  // Remove parent wrapper effect
  if (body.parentElement) {
    body.parentElement.style.maxWidth = "100vw";
    body.parentElement.style.margin = "0";
  }
})();

</script>

</body>
</html>
